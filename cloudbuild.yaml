steps:
  # Step 1 — Build the training image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-training:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-training:latest'
      - './training'

  # Step 2 — Build the serving image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-serving:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-serving:latest'
      - './serving'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-training:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-training:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-serving:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/promo-serving:latest'

options:
  logging: CLOUD_LOGGING_ONLY