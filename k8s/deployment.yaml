apiVersion: apps/v1
kind: Deployment
metadata:
  name: promo-serving
  labels:
    app: promo-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promo-serving
  template:
    metadata:
      labels:
        app: promo-serving
    spec:
      # This Pod will act as the GCP service account below
      # (configured via Workload Identity — set up next)
      serviceAccountName: promo-serving-ksa
      containers:
        - name: promo-serving
          image: us-central1-docker.pkg.dev/promo-roi-platform-2026/ml-repo/promo-serving:v2
          ports:
            - containerPort: 8080

          env:
            - name: PROJECT_ID
              value: "promo-roi-platform-2026"
            - name: GCS_BUCKET
              value: "promo-roi-platform-2026-data"
            - name: MODEL_RUN_ID
              value: "5b88b989d6c64e75908f48254c262a72"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # NEW — handles slow/cold startup (up to 150s)
          # Once this succeeds ONCE, livenessProbe takes over
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          # Now only handles ONGOING health, post-startup
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5