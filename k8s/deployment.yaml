apiVersion: apps/v1
kind: Deployment
metadata:
  name: promo-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promo-serving
  template:
    metadata:
      labels:
        app: promo-serving
    spec:
      containers:
        - name: promo-serving
          image: us-central1-docker.pkg.dev/PROJECT_ID/promo-roi/promo-serving:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
